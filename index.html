<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music App</title><style>
body {
  margin: 0;
  font-family: Arial;
  background: #121212;
  color: white;
}

.header {
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

.search-box {
  padding: 10px;
}

.search-box input {
  width: 100%;
  padding: 12px;
  border-radius: 20px;
  border: none;
  background: #1e1e1e;
  color: white;
}

.section {
  padding: 15px;
}

.song {
  display: flex;
  align-items: center;
  padding: 8px;
  border-radius: 10px;
  cursor: pointer;
}

.song:hover {
  background: #1e1e1e;
}

.song img {
  width: 50px;
  height: 50px;
  border-radius: 5px;
  margin-right: 10px;
}

.album {
  display: flex;
  overflow-x: auto;
  gap: 12px;
}

.album img {
  width: 130px;
  border-radius: 12px;
  cursor: pointer;
}

.player {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #181818;
  padding: 8px;
}

iframe {
  border-radius: 10px;
}

</style></head><body><div class="header">🎧 Spotify Style Music</div><div class="search-box">
  <input type="text" id="search" placeholder="Cari lagu..." onkeyup="searchSong()">
</div><div class="section">
  <h3>Sering kamu putar</h3>  <div class="song" onclick="play('dQw4w9WgXcQ')">
    <img src="https://img.youtube.com/vi/dQw4w9WgXcQ/0.jpg">
    <div>Never Gonna Give You Up</div>
  </div>  <div class="song" onclick="play('3JZ_D3ELwOQ')">
    <img src="https://img.youtube.com/vi/3JZ_D3ELwOQ/0.jpg">
    <div>See You Again</div>
  </div>  <div class="song" onclick="play('kJQP7kiw5Fk')">
    <img src="https://img.youtube.com/vi/kJQP7kiw5Fk/0.jpg">
    <div>Despacito</div>
  </div></div><div class="section">
  <h3>Album</h3>  <div class="album">
    <img src="https://img.youtube.com/vi/dQw4w9WgXcQ/0.jpg" onclick="play('dQw4w9WgXcQ')">
    <img src="https://img.youtube.com/vi/3JZ_D3ELwOQ/0.jpg" onclick="play('3JZ_D3ELwOQ')">
    <img src="https://img.youtube.com/vi/kJQP7kiw5Fk/0.jpg" onclick="play('kJQP7kiw5Fk')">
  </div>
</div><div class="player">
  <iframe id="player" width="100%" height="80"
  src="https://www.youtube.com/embed/dQw4w9WgXcQ"
  allow="autoplay"></iframe>
</div><script>
function play(id){
  document.getElementById("player").src =
  "https://www.youtube.com/embed/" + id + "?autoplay=1";
}

function searchSong(){
  let input = document.getElementById("search").value.toLowerCase();
  let songs = document.getElementsByClassName("song");

  for(let i=0;i<songs.length;i++){
    let text = songs[i].innerText.toLowerCase();
    songs[i].style.display = text.includes(input) ? "flex" : "none";
  }
}
</script></body>
</html>
