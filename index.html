<!DOCTYPE html>
<html>
<head>
  <title>Music App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #121212;
      color: white;
      text-align: center;
    }
    h2 {
      background: #1db954;
      padding: 15px;
      margin: 0;
    }
    .song {
      margin: 10px;
      padding: 10px;
      background: #1e1e1e;
      border-radius: 10px;
      cursor: pointer;
    }
    .song:hover {
      background: #333;
    }
  </style>
</head>
<body>

<h2>🎧 Music App</h2>

<iframe id="player" width="300" height="170"
src="https://www.youtube.com/embed/dQw4w9WgXcQ"
allow="autoplay"></iframe>

<div class="song" onclick="play('dQw4w9WgXcQ')">Lagu 1</div>
<div class="song" onclick="play('3JZ_D3ELwOQ')">Lagu 2</div>
<div class="song" onclick="play('kJQP7kiw5Fk')">Lagu 3</div>

<script>
function play(id) {
  document.getElementById("player").src =
  "https://www.youtube.com/embed/" + id + "?autoplay=1";
}
</script>

</body>
</html>
