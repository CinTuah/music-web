<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Music Ultra</title><style>
:root{
  --green:#1db954;
  --bg:#0b0b0b;
  --card:#181818;
  --text:#ffffff;
  --sub:#9aa0a6;
}

body{margin:0;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text)}

.header{padding:20px;font-size:22px;font-weight:700}

.search{padding:0 15px 10px}
.search input{
 width:100%;padding:14px;border-radius:30px;
 border:none;background:#202020;color:white;
 outline:none
}

.grid{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:14px;padding:14px
}

.card{
 background:var(--card);
 border-radius:18px;
 overflow:hidden;
 cursor:pointer;
 transition:0.25s;
}
.card:hover{transform:scale(1.04)}

.card img{
 width:100%;height:140px;object-fit:cover
}

.info{padding:10px}
.title{font-size:13px;font-weight:500}
.artist{font-size:11px;color:var(--sub)}

/* FLOAT PLAYER SPOTIFY STYLE */
.player{
 position:fixed;
 bottom:12px;
 left:10px;
 right:10px;
 background:rgba(24,24,24,0.95);
 backdrop-filter:blur(20px);
 border-radius:20px;
 padding:12px;
 display:flex;
 align-items:center;
 gap:12px;
 box-shadow:0 8px 30px rgba(0,0,0,0.6);
}

.player img{
 width:56px;height:56px;border-radius:12px
}

.player-info{flex:1}
.player-title{font-size:14px;font-weight:500}
.player-artist{font-size:11px;color:var(--sub)}

.controls{
 display:flex;align-items:center;gap:12px
}

/* SMALL BUTTON */
.small-btn{
 width:36px;height:36px;border-radius:50%;
 background:#2a2a2a;
 display:flex;align-items:center;justify-content:center;
 cursor:pointer;
}

.small-btn::before{
 content:'';
 width:0;height:0;
 border-top:6px solid transparent;
 border-bottom:6px solid transparent;
}

.small-prev::before{
 border-right:10px solid white;
 margin-left:-2px;
}

.small-next::before{
 border-left:10px solid white;
 margin-left:2px;
}

/* MAIN PLAY BUTTON */
.main-btn{
 width:48px;height:48px;border-radius:50%;
 background:var(--green);
 display:flex;align-items:center;justify-content:center;
 cursor:pointer;
 box-shadow:0 4px 15px rgba(0,0,0,0.4);
}

.main-btn.play::before{
 content:'';
 border-left:14px solid black;
 border-top:8px solid transparent;
 border-bottom:8px solid transparent;
 margin-left:4px;
}

.main-btn.pause::before{
 content:'';
 width:14px;height:14px;background:black;
 box-shadow:8px 0 0 black;
}

.main-btn:active,.small-btn:active{
 transform:scale(0.9)
}

iframe{width:0;height:0;border:none}

</style></head><body><div class="header">Nova Music</div><div class="search">
<input type="text" id="search" placeholder="Search music..." oninput="debounceSearch()">
</div><div class="grid" id="results"></div><div class="player" id="playerUI" style="display:none">
  <img id="cover">
  <div class="player-info">
    <div class="player-title" id="title"></div>
    <div class="player-artist" id="artist"></div>
  </div>
  <div class="controls">
    <div class="small-btn small-prev" onclick="prev()"></div>
    <div class="main-btn play" id="playBtn" onclick="toggle()"></div>
    <div class="small-btn small-next" onclick="next()"></div>
  </div>
</div><iframe id="player" allow="autoplay"></iframe><script>
const API_KEY="AIzaSyAZ-yES2YmYiLlSCztEVP4mFO6vPFGdZTM";
let timeout,playlist=[],current=0,playing=false;

function play(id,title,thumb,channel){
 playlist=[{id,title,thumb,channel}];
 current=0;
 load();
}

function load(){
 let s=playlist[current];
 document.getElementById("player").src=
 `https://www.youtube.com/embed/${s.id}?autoplay=1`;
 document.getElementById("title").innerText=s.title;
 document.getElementById("artist").innerText=s.channel;
 document.getElementById("cover").src=s.thumb;
 document.getElementById("playerUI").style.display="flex";
 document.getElementById("playBtn").className="main-btn pause";
 playing=true;
}

function toggle(){
 let iframe=document.getElementById("player");
 let btn=document.getElementById("playBtn");
 if(playing){
 iframe.src="";
 btn.className="main-btn play";
 playing=false;
 }else{
 load();
 }
}

function next(){if(current<playlist.length-1){current++;load();}}
function prev(){if(current>0){current--;load();}}

function debounceSearch(){clearTimeout(timeout);timeout=setTimeout(searchYT,400)}

async function searchYT(){
 let q=document.getElementById("search").value;
 if(q.length<2) return;

 document.getElementById("results").innerHTML="Searching...";

 try{
 let res=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&type=video&maxResults=10&key=${API_KEY}`);
 let data=await res.json();

 let html="";
 data.items.forEach(v=>{
 let id=v.id.videoId;
 let title=v.snippet.title.replace(/'/g,"");
 let thumb=v.snippet.thumbnails.medium.url;
 let channel=v.snippet.channelTitle;

 html+=`<div class="card" onclick="play('${id}','${title}','${thumb}','${channel}')">
 <img src="${thumb}">
 <div class="info">
 <div class="title">${title}</div>
 <div class="artist">${channel}</div>
 </div>
 </div>`;
 });

 document.getElementById("results").innerHTML=html;

 }catch(e){document.getElementById("results").innerHTML="Error"}
}
</script></body>
</html>
