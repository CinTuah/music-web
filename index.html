<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Nova Music</title>
<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --green: #1db954;
  --bg: #121212;
  --card: #181818;
  --card2: #282828;
  --text: #fff;
  --sub: #b3b3b3;
}
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── FILTER BAR ── */
.filter-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 14px 16px 12px;
  overflow-x: auto; scrollbar-width: none;
  position: sticky; top: 0;
  background: var(--bg); z-index: 10;
}
.filter-bar::-webkit-scrollbar { display: none; }

.avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: #e8622a; color: white;
  font-size: 14px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; cursor: pointer;
  overflow: hidden; border: none; outline: none; padding: 0;
}
.avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

.pill {
  padding: 7px 16px; border-radius: 999px;
  font-size: 14px; font-weight: 500;
  cursor: pointer; white-space: nowrap;
  border: none; outline: none; flex-shrink: 0;
  transition: all 0.15s;
}
.pill.active { background: var(--green); color: #000; font-weight: 700; }
.pill.inactive { background: #2a2a2a; color: #fff; }

/* ── SECTION ── */
.section-title {
  padding: 20px 16px 12px;
  font-size: 20px; font-weight: 700; letter-spacing: -0.3px;
}

/* ── HORIZONTAL SCROLL ── */
.h-row {
  display: flex; gap: 12px;
  overflow-x: auto; padding: 0 16px 4px;
  scrollbar-width: none;
}
.h-row::-webkit-scrollbar { display: none; }

/* ── TRACK CARD (vertical) ── */
.track-card { flex-shrink: 0; width: 140px; cursor: pointer; transition: opacity 0.15s; }
.track-card:active { opacity: 0.7; }
.track-card img { width: 140px; height: 140px; border-radius: 8px; object-fit: cover; display: block; }
.tc-title { font-size: 13px; font-weight: 600; margin-top: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tc-artist { font-size: 12px; color: var(--sub); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── TRACK LIST ── */
.track-list { padding: 0 16px; }
.track-item {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 0; cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: background 0.1s;
}
.track-item:active { background: rgba(255,255,255,0.04); border-radius: 8px; }
.track-item img { width: 52px; height: 52px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
.ti-info { flex: 1; min-width: 0; }
.ti-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ti-artist { font-size: 12px; color: var(--sub); margin-top: 2px; }
.ti-more { color: var(--sub); padding: 8px 4px; display: flex; align-items: center; }

/* ── SKELETON ── */
.skeleton {
  background: linear-gradient(90deg, #282828 25%, #333 50%, #282828 75%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
  border-radius: 8px;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.skel-card { width: 140px; height: 140px; border-radius: 8px; flex-shrink: 0; }
.skel-row { display: flex; gap: 12px; padding: 0 16px 4px; overflow: hidden; }

/* ── PLAYER ── */
.player {
  position: fixed; bottom: 70px; left: 8px; right: 8px;
  background: #1f3a5f; border-radius: 12px; padding: 10px 12px;
  display: none; align-items: center; gap: 10px;
  z-index: 100; overflow: hidden;
  box-shadow: 0 8px 24px rgba(0,0,0,0.6);
}
.player.visible { display: flex; }
.player-thumb { width: 46px; height: 46px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
.player-info { flex: 1; min-width: 0; }
.player-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.player-artist { font-size: 11px; color: rgba(255,255,255,0.65); margin-top: 2px; }
.player-controls { display: flex; align-items: center; gap: 8px; }
.ctrl-btn {
  width: 36px; height: 36px; background: rgba(255,255,255,0.12);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  cursor: pointer; border: none; outline: none; transition: background 0.15s;
}
.ctrl-btn:active { background: rgba(255,255,255,0.22); }
.ctrl-btn.play-btn { background: #fff; width: 40px; height: 40px; }
.player-progress { position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: rgba(255,255,255,0.15); }
.player-progress-bar { height: 100%; background: var(--green); width: 0%; transition: width 0.5s linear; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #121212; border-top: 1px solid rgba(255,255,255,0.07);
  display: flex; padding: 8px 0 20px; z-index: 99;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 3px; cursor: pointer;
  font-size: 10px; color: var(--sub); padding: 4px 0; transition: color 0.15s;
}
.nav-item.active { color: #fff; }
.nav-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }

/* ── SEARCH OVERLAY ── */
.search-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 200; display: none; flex-direction: column; }
.search-overlay.open { display: flex; }
.search-header { display: flex; align-items: center; gap: 14px; padding: 52px 16px 14px; }
.search-box { flex: 1; display: flex; align-items: center; background: #fff; border-radius: 6px; padding: 0 14px; height: 44px; gap: 10px; }
.search-box input { flex: 1; border: none; outline: none; background: transparent; font-size: 15px; color: #000; font-weight: 500; }
.search-box input::placeholder { color: #aaa; }
.search-cancel { color: #fff; font-size: 14px; cursor: pointer; font-weight: 500; white-space: nowrap; }
.search-results { flex: 1; overflow-y: auto; padding: 0 16px; }
.result-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
.result-item img { width: 52px; height: 52px; border-radius: 4px; object-fit: cover; }
.result-info { flex: 1; min-width: 0; }
.result-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.result-ch { font-size: 12px; color: var(--sub); margin-top: 3px; }
.loading-text { color: var(--sub); font-size: 14px; padding: 20px 0; text-align: center; }

/* ── ONBOARDING ── */
.onboard-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.88);
  z-index: 900; display: flex; align-items: flex-end;
  backdrop-filter: blur(4px);
}
.onboard-box {
  background: #1a1a1a; border-radius: 20px 20px 0 0;
  padding: 28px 20px 40px; width: 100%;
  max-height: 88vh; overflow-y: auto;
}
.onboard-box h2 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
.onboard-box p { font-size: 14px; color: var(--sub); margin-bottom: 20px; line-height: 1.5; }
.genre-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 28px; }
.genre-chip {
  display: inline-flex; align-items: center;
  padding: 9px 18px; border-radius: 999px;
  font-size: 13px; font-weight: 600;
  cursor: pointer; flex-shrink: 0;
  border: 2px solid transparent; transition: all 0.2s;
}
.genre-chip.selected { border-color: var(--green); background: rgba(29,185,84,0.18) !important; }
.onboard-btn {
  width: 100%; padding: 15px;
  background: var(--green); color: #000;
  border: none; border-radius: 999px;
  font-size: 16px; font-weight: 700; cursor: pointer;
}
.onboard-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── LOGIN MODAL ── */
.login-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 950; align-items: center; justify-content: center; }
.login-modal.open { display: flex; }
.login-box { background: #282828; border-radius: 16px; padding: 32px 24px; width: 300px; text-align: center; }
.login-box h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.login-box p { font-size: 13px; color: var(--sub); margin-bottom: 24px; }
.google-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: #fff; color: #000; border: none; border-radius: 999px; padding: 12px 24px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; }
.login-close { margin-top: 14px; color: var(--sub); font-size: 13px; cursor: pointer; display: block; }

/* ── PROFILE DROPDOWN ── */
.profile-dropdown { display: none; position: fixed; top: 62px; left: 16px; background: #282828; border-radius: 10px; padding: 12px 0; z-index: 500; min-width: 210px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
.profile-dropdown.open { display: block; }
.pd-header { display: flex; align-items: center; gap: 10px; padding: 4px 16px 12px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 8px; }
.pd-photo { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
.pd-name { font-size: 14px; font-weight: 600; }
.pd-email { font-size: 11px; color: var(--sub); margin-top: 2px; }
.pd-item { padding: 10px 16px; font-size: 13px; cursor: pointer; }
.pd-item:hover { background: rgba(255,255,255,0.07); }
.pd-item.logout { color: #f15e6c; }

.main-content { padding-bottom: 145px; }
#ytplayer { display: none; }
</style>
</head>
<body>
<div id="ytplayer"></div>

<div class="main-content">
  <div class="filter-bar">
    <button class="avatar" id="avatarBtn" onclick="toggleProfileDropdown()">?</button>
    <button class="pill active" onclick="setFilter(this)">Semua</button>
    <button class="pill inactive" onclick="setFilter(this)">Musik</button>
    <button class="pill inactive" onclick="setFilter(this)">Podcast</button>
  </div>
  <div id="homeContent"></div>
</div>

<!-- SEARCH OVERLAY -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-header">
    <div class="search-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Artis, lagu, atau podcast" oninput="debounceSearch()">
    </div>

<!-- ONBOARDING -->
<div class="onboard-overlay" id="onboardOverlay" style="display:none;">
  <div class="onboard-box">
    <h2>Kamu suka musik apa? 🎵</h2>

    <button class="onboard-btn" id="onboardBtn" onclick="saveGenres()" disabled>Simpan Selera</button>

</div>

<!-- LOGIN MODAL -->
<div class="login-modal" id="loginModal">
  <div class="login-box">
    <h2>Masuk ke Nova Music</h2>
    <p>Masuk dengan Google untuk pengalaman yang lebih personal</p>
    <button class="google-btn" onclick="triggerGoogleLogin()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Masuk dengan Google
    </button>
    <span class="login-close" onclick="closeLoginModal()">Tutup</span>
  </div>
</div>

<!-- PROFILE DROPDOWN -->
<div class="profile-dropdown" id="profileDropdown">
  <div class="pd-header">
    <img class="pd-photo" id="dropdownPhoto" src="" alt="">
    <div>
      <div class="pd-name" id="dropdownName">-</div>
      <div class="pd-email" id="dropdownEmail">-</div>
    </div>

  <div class="pd-item" onclick="openGenreEditor()">✨ Edit Selera Musik</div>

</div>

<!-- PLAYER -->
<div class="player" id="playerBar">
  <img class="player-thumb" id="playerThumb" src="" alt="">
  <div class="player-info">
    <div class="player-title" id="playerTitle">-</div>

  <div class="player-progress"><div class="player-progress-bar" id="progressBar"></div></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <div class="nav-item active" onclick="setNav(this)">
    <div class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
    <span>Home</span>
  </div>
  <div class="nav-item" onclick="openSearch(); setNav(this)">
    <div class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
    <span>Cari</span>
  </div>
  <div class="nav-item" onclick="setNav(this)">
    <div class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M3 18V6l4 8V6h3l3 8V6h3v12h-3l-3-8v8h-3L7 10v8H3zm15 0V6h2v12h-2z"/></svg></div>
    <span>Koleksi</span>
  </div>
  <div class="nav-item" onclick="setNav(this)">
    <div class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/></svg></div>

    <span>Buat</span>
  </div>
</nav>

<script>
const API_KEY = "AIzaSyAZ-yES2YmYiLlSCztEVP4mFO6vPFGdZTM";
const GOOGLE_CLIENT_ID = "GANTI_DENGAN_CLIENT_ID_KAMU.apps.googleusercontent.com";

const GENRES = [
  { id:'pop',       label:'🎤 Pop',         color:'#e91e8c', query:'pop music hits 2024' },
  { id:'kpop',      label:'🇰🇷 K-Pop',      color:'#9c27b0', query:'kpop hits 2024' },
  { id:'hiphop',    label:'🎧 Hip-Hop',     color:'#ff5722', query:'hip hop rap hits' },
  { id:'rnb',       label:'🎷 R&B',         color:'#3f51b5', query:'rnb soul music hits' },
  { id:'rock',      label:'🎸 Rock',        color:'#f44336', query:'rock music hits' },
  { id:'indie',     label:'🌿 Indie',       color:'#4caf50', query:'indie music hits' },
  { id:'jazz',      label:'🎺 Jazz',        color:'#795548', query:'jazz music best' },
  { id:'edm',       label:'🎛️ EDM',         color:'#00bcd4', query:'edm electronic dance music' },
  { id:'classical', label:'🎻 Klasik',      color:'#607d8b', query:'classical music orchestra' },
  { id:'dangdut',   label:'🥁 Dangdut',     color:'#ff9800', query:'dangdut terbaru 2024' },
  { id:'indopop',   label:'🎵 Indo Pop',    color:'#8bc34a', query:'lagu pop indonesia terbaru' },
  { id:'lofi',      label:'☕ Lo-Fi',       color:'#9e9e9e', query:'lofi hip hop chill beats' },
  { id:'metal',     label:'🤘 Metal',       color:'#757575', query:'heavy metal rock music' },
  { id:'acoustic',  label:'🪕 Acoustic',    color:'#a1887f', query:'acoustic guitar music' },
  { id:'anime',     label:'🌸 Anime OST',   color:'#f06292', query:'anime ost soundtrack' },
  { id:'gospel',    label:'🙏 Gospel',      color:'#ffc107', query:'gospel worship christian music' },
  { id:'opm',       label:'🏝️ OPM',         color:'#26c6da', query:'original pilipino music opm' },
  { id:'reggae',    label:'🌴 Reggae',      color:'#66bb6a', query:'reggae music hits' },
];

let currentUser = null;
let selectedGenres = [];
let playHistory = [];
let playlist = [], currentIdx = 0, isPlaying = false;
let ytPlayer, progressInterval, searchTimeout;

// ── STORAGE ──
function skey(k) { return `nm_${currentUser ? currentUser.email : 'guest'}_${k}`; }
function save(k, v) { try { localStorage.setItem(skey(k), JSON.stringify(v)); } catch(e){} }
function load(k, def) { try { const v = localStorage.getItem(skey(k)); return v !== null ? JSON.parse(v) : def; } catch(e){ return def; } }

// ── INIT ──
window.addEventListener('load', () => {
  if (typeof google !== 'undefined' && google.accounts) {
    google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleGoogleCb, auto_select: false });
  }
  const saved = localStorage.getItem('novaUser');
  if (saved) { currentUser = JSON.parse(saved); applyAvatar(currentUser); }
  loadUserData();
  bootHome();
});

function loadUserData() {
  selectedGenres = load('genres', []);
  playHistory    = load('history', []);
}

function bootHome() {
  selectedGenres.length === 0 ? showOnboarding() : renderHome();
}

// ── ONBOARDING ──
function showOnboarding() {
  document.getElementById('genreGrid').innerHTML = GENRES.map(g => `
    <div class="genre-chip" id="chip_${g.id}"
      style="background:${g.color}22; color:${g.color};"
      onclick="toggleGenre('${g.id}')">
      ${g.label}
    </div>`).join('');
  selectedGenres = [];
  document.getElementById('onboardBtn').disabled = true;
  document.getElementById('onboardOverlay').style.display = 'flex';
}

function toggleGenre(id) {
  const chip = document.getElementById('chip_' + id);
  const i = selectedGenres.indexOf(id);
  if (i >= 0) { selectedGenres.splice(i, 1); chip.classList.remove('selected'); }
  else { selectedGenres.push(id); chip.classList.add('selected'); }
  document.getElementById('onboardBtn').disabled = selectedGenres.length < 3;
}

function saveGenres() {
  save('genres', selectedGenres);
  document.getElementById('onboardOverlay').style.display = 'none';
  renderHome();
}

function openGenreEditor() {
  document.getElementById('profileDropdown').classList.remove('open');
  // Re-render chips with current selection
  document.getElementById('genreGrid').innerHTML = GENRES.map(g => `
    <div class="genre-chip ${selectedGenres.includes(g.id)?'selected':''}" id="chip_${g.id}"
      style="background:${g.color}22; color:${g.color};"
      onclick="toggleGenre('${g.id}')">
      ${g.label}
    </div>`).join('');
  document.getElementById('onboardBtn').disabled = selectedGenres.length < 3;
  document.getElementById('onboardOverlay').style.display = 'flex';
}

// ── HOME ──
async function renderHome() {
  const hr = new Date().getHours();
  const greet = hr < 11 ? 'Selamat pagi' : hr < 15 ? 'Selamat siang' : hr < 19 ? 'Selamat sore' : 'Selamat malam';
  const name = currentUser ? currentUser.name.split(' ')[0] : 'Kamu';
  const emoji = hr < 11 ? '☀️' : hr < 15 ? '🌤️' : hr < 19 ? '🌅' : '🌙';

  // Sort genres: most played first
  const playCount = {};
  playHistory.forEach(t => { if(t.genre) playCount[t.genre] = (playCount[t.genre]||0)+1; });
  const sorted = [...selectedGenres].sort((a,b) => (playCount[b]||0)-(playCount[a]||0));

  let html = `
    <div style="padding:4px 16px 2px; font-size:22px; font-weight:800;">${greet}, ${name} ${emoji}</div>
    <div style="padding:2px 16px 14px; font-size:13px; color:var(--sub);">Beranda khusus buat kamu</div>
  `;

  // History section
  if (playHistory.length > 0) {
    html += `<div class="section-title">⏱ Terakhir diputar</div>
    <div class="track-list" id="historyList">${buildHistoryHTML()}</div>`;
  }

  // Skeleton for each genre
  html += sorted.map(gid => {
    const g = GENRES.find(x=>x.id===gid);
    return `
      <div class="section-title" id="title_${gid}">${g.label}</div>
      <div class="skel-row" id="sec_${gid}">
        ${[1,2,3,4].map(()=>`<div class="skeleton skel-card"></div>`).join('')}
      </div>`;
  }).join('');

  document.getElementById('homeContent').innerHTML = html;

  // Load each genre async
  for (const gid of sorted) {
    await loadSection(gid);
    await sleep(100);
  }
}

async function loadSection(gid) {
  const g = GENRES.find(x=>x.id===gid);
  const el = document.getElementById('sec_' + gid);
  if (!el) return;
  try {
    const items = await fetchYT(g.query, 10);
    if (!items.length) { el.remove(); document.getElementById('title_'+gid)?.remove(); return; }
    el.className = 'h-row';
    el.innerHTML = items.map(v => {
      const t = { id:v.id.videoId, title:v.snippet.title, artist:v.snippet.channelTitle, thumb:v.snippet.thumbnails.medium.url, genre:gid };
      return `<div class="track-card" onclick='playTrack(${esc(t)})'>
        <img src="${t.thumb}" onerror="this.src='https://picsum.photos/seed/${t.id}/140'" alt="">
        <div class="tc-title">${eh(t.title)}</div>
        <div class="tc-artist">${eh(t.artist)}</div>
      </div>`;
    }).join('');
  } catch(e) {
    el.innerHTML = `<p style="color:var(--sub);padding:8px 0;font-size:13px;">Gagal memuat: ${e.message}</p>`;
  }
}

function buildHistoryHTML() {
  const seen = new Set();
  return playHistory
    .filter(t => { if(seen.has(t.id)) return false; seen.add(t.id); return true; })
    .slice(0, 5)
    .map(t => `
      <div class="track-item" onclick='playTrack(${esc(t)})'>
        <img src="${t.thumb}" onerror="this.src='https://picsum.photos/seed/${t.id}/52'" alt="">
        <div class="ti-info">
          <div class="ti-title">${eh(t.title)}</div>
          <div class="ti-artist">${eh(t.artist)}</div>
        </div>
        <div class="ti-more"><svg width="4" height="16" viewBox="0 0 4 16" fill="currentColor">
          <circle cx="2" cy="2" r="1.5"/><circle cx="2" cy="8" r="1.5"/><circle cx="2" cy="14" r="1.5"/>
        </svg></div>
      </div>`).join('');
}

// ── YOUTUBE API ──
async function fetchYT(q, max=10) {
  const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q)}&type=video&maxResults=${max}&videoCategoryId=10&key=${API_KEY}`;
  const r = await fetch(url);
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  return (d.items||[]).filter(v => v.id?.videoId);
}

// ── PLAYER ──
function onYouTubeIframeAPIReady() {
  ytPlayer = new YT.Player('ytplayer', {
    height:'0', width:'0',
    events: {
      onStateChange: e => {
        if (e.data === 0) nextTrack();
        if (e.data === 1) setPlayIcon(true);
        if (e.data === 2) setPlayIcon(false);
      }
    }
  });
}

function playTrack(t) {
  // Record history
  playHistory.unshift({...t, playedAt: Date.now()});
  if (playHistory.length > 200) playHistory = playHistory.slice(0, 200);
  save('history', playHistory);

  // Refresh history section
  const hl = document.getElementById('historyList');
  if (hl) hl.innerHTML = buildHistoryHTML();
  else if (document.getElementById('homeContent').innerHTML.indexOf('historyList') === -1) {
    // Insert history section at top
    const hc = document.getElementById('homeContent');
    const first = hc.querySelector('.section-title');
    const div = document.createElement('div');
    div.innerHTML = `<div class="section-title">⏱ Terakhir diputar</div><div class="track-list" id="historyList">${buildHistoryHTML()}</div>`;
    if (first) hc.insertBefore(div, first);
    else hc.prepend(div);
  }

  const ex = playlist.findIndex(x => x.id === t.id);
  if (ex >= 0) currentIdx = ex;
  else { playlist.push(t); currentIdx = playlist.length - 1; }
  loadCurrent();
}

function loadCurrent() {
  const t = playlist[currentIdx];
  if (!t || !ytPlayer?.loadVideoById) return;
  ytPlayer.loadVideoById(t.id);
  isPlaying = true;
  document.getElementById('playerTitle').textContent = t.title;
  document.getElementById('playerArtist').textContent = t.artist;
  document.getElementById('playerThumb').src = t.thumb;
  document.getElementById('playerBar').classList.add('visible');
  setPlayIcon(true);
  startProgress();
}

function togglePlay() {
  if (!ytPlayer) return;
  isPlaying ? ytPlayer.pauseVideo() : ytPlayer.playVideo();
}

function setPlayIcon(p) {
  isPlaying = p;
  document.getElementById('playIcon').innerHTML = p
    ? '<rect x="6" y="4" width="4" height="16" rx="1" fill="black"/><rect x="14" y="4" width="4" height="16" rx="1" fill="black"/>'
    : '<path d="M8 5v14l11-7z" fill="black"/>';
}

function nextTrack() { if (currentIdx < playlist.length-1) { currentIdx++; loadCurrent(); } }
function prevTrack() { if (currentIdx > 0) { currentIdx--; loadCurrent(); } }

function startProgress() {
  clearInterval(progressInterval);
  progressInterval = setInterval(() => {
    if (!ytPlayer?.getCurrentTime) return;
    const c = ytPlayer.getCurrentTime(), d = ytPlayer.getDuration();
    if (d) document.getElementById('progressBar').style.width = (c/d*100)+'%';
  }, 500);
}

// ── SEARCH ──
function debounceSearch() { clearTimeout(searchTimeout); searchTimeout = setTimeout(doSearch, 420); }

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  const el = document.getElementById('searchResults');
  if (!q) { el.innerHTML = '<p style="color:#fff;font-size:16px;font-weight:700;padding:8px 0;">Cari apa hari ini?</p>'; return; }
  el.innerHTML = '<p class="loading-text">Mencari...</p>';
  try {
    const items = await fetchYT(q, 15);
    if (!items.length) { el.innerHTML = '<p class="loading-text">Tidak ada hasil.</p>'; return; }
    el.innerHTML = items.map(v => {
      const t = { id:v.id.videoId, title:v.snippet.title, artist:v.snippet.channelTitle, thumb:v.snippet.thumbnails.medium.url };
      return `<div class="result-item" onclick='selectResult(${esc(t)})'>
        <img src="${t.thumb}" alt="">
        <div class="result-info">
          <div class="result-title">${eh(t.title)}</div>
          <div class="result-ch">${eh(t.artist)}</div>
        </div>
      </div>`;
    }).join('');
  } catch(e) { el.innerHTML = `<p class="loading-text">Error: ${eh(e.message)}</p>`; }
}

function selectResult(t) { playTrack(t); closeSearch(); }

// ── GOOGLE AUTH ──
function triggerGoogleLogin() {
  if (GOOGLE_CLIENT_ID.includes('GANTI')) {
    handleLoginSuccess({ name:'Nova User', email:'demo@novamusic.app', picture:'https://ui-avatars.com/api/?name=Nova+User&background=1db954&color=fff&size=64&bold=true&rounded=true' });
    return;
  }
  if (typeof google !== 'undefined') google.accounts.id.prompt();
}
function handleGoogleCb(res) {
  const p = JSON.parse(atob(res.credential.split('.')[1]));
  handleLoginSuccess({ name:p.name, email:p.email, picture:p.picture });
}
function handleLoginSuccess(user) {
  currentUser = user;
  localStorage.setItem('novaUser', JSON.stringify(user));
  applyAvatar(user);
  closeLoginModal();
  loadUserData();
  bootHome();
}
function applyAvatar(user) {
  const btn = document.getElementById('avatarBtn');
  btn.innerHTML = user.picture
    ? `<img src="${user.picture}" alt="" onerror="this.parentElement.textContent='${eh(user.name[0].toUpperCase())}';">`
    : eh(user.name[0].toUpperCase());
  btn.style.background = user.picture ? 'transparent' : '#e8622a';
  document.getElementById('dropdownName').textContent = user.name;
  document.getElementById('dropdownEmail').textContent = user.email;
  document.getElementById('dropdownPhoto').src = user.picture || '';
}
function logoutUser() {
  currentUser = null;
  localStorage.removeItem('novaUser');
  document.getElementById('avatarBtn').innerHTML = '?';
  document.getElementById('avatarBtn').style.background = '#555';
  document.getElementById('profileDropdown').classList.remove('open');
  selectedGenres = []; playHistory = [];
  bootHome();
}
function toggleProfileDropdown() {
  if (!currentUser) { openLoginModal(); return; }
  document.getElementById('profileDropdown').classList.toggle('open');
}

// ── UI ──
function openSearch() { document.getElementById('searchOverlay').classList.add('open'); setTimeout(()=>document.getElementById('searchInput').focus(),100); }
function closeSearch() { document.getElementById('searchOverlay').classList.remove('open'); document.getElementById('searchInput').value=''; }
function openLoginModal() { document.getElementById('loginModal').classList.add('open'); }
function closeLoginModal() { document.getElementById('loginModal').classList.remove('open'); }
function setFilter(btn) { document.querySelectorAll('.pill').forEach(p=>p.className='pill inactive'); btn.className='pill active'; }
function setNav(el) { document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active')); el.classList.add('active'); }

// ── UTILS ──
const sleep = ms => new Promise(r => setTimeout(r, ms));
function eh(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function esc(obj) { return JSON.stringify(obj).replace(/'/g,"&#39;"); }

document.addEventListener('click', e => {
  const dd = document.getElementById('profileDropdown');
  const av = document.getElementById('avatarBtn');
  if (dd && !dd.contains(e.target) && !av.contains(e.target)) dd.classList.remove('open');
});
</script>
