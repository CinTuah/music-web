<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Music 100%</title>
<script src="https://www.youtube.com/iframe_api"></script><style>
:root{--green:#1db954;--bg:#0a0a0a;--card:#151515;--text:#fff;--sub:#9aa0a6}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,sans-serif;background:var(--bg);color:var(--text);transition:0.5s}

.header{display:flex;justify-content:space-between;padding:16px}
.logo{display:flex;gap:8px;align-items:center}
.logo-box{width:34px;height:34px;border-radius:12px;background:linear-gradient(135deg,#1db954,#00ffc6)}

.search{padding:0 15px}
.search input{width:100%;padding:12px;border-radius:25px;border:none;background:#1f1f1f;color:#fff}

.section-title{padding:10px 15px;color:#aaa}
.row{display:flex;gap:12px;overflow-x:auto;padding:0 15px}
.card{min-width:140px;background:var(--card);border-radius:16px;overflow:hidden}
.card img{width:100%;height:120px;object-fit:cover}
.info{padding:8px}
.title{font-size:12px}
.artist{font-size:10px;color:var(--sub)}

.player{position:fixed;bottom:10px;left:10px;right:10px;background:rgba(20,20,20,0.7);backdrop-filter:blur(30px);border-radius:26px;padding:12px;display:flex;gap:12px;align-items:center}
.player img{width:50px;height:50px;border-radius:14px}
.player-info{flex:1}
.controls{display:flex;gap:8px;align-items:center}

.btn{display:flex;align-items:center;justify-content:center;border-radius:50%}
.small{width:32px;height:32px;background:#2a2a2a}
.main{width:50px;height:50px;background:var(--green)}

.small.prev::before{content:'';border-right:10px solid white;border-top:6px solid transparent;border-bottom:6px solid transparent}
.small.next::before{content:'';border-left:10px solid white;border-top:6px solid transparent;border-bottom:6px solid transparent}

.main.play::before{content:'';border-left:14px solid black;border-top:8px solid transparent;border-bottom:8px solid transparent}
.main.pause::before{content:'';width:6px;height:16px;background:black;box-shadow:10px 0 0 black}

.progress{height:4px;background:#333;border-radius:10px;margin-top:6px;overflow:hidden;cursor:pointer}
.bar{height:100%;width:0;background:var(--green)}
.time{display:flex;justify-content:space-between;font-size:10px;color:var(--sub)}

.like{font-size:18px;cursor:pointer}
.volume{width:80px}

.full{position:fixed;inset:0;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center}
.full img{width:70%;border-radius:20px;margin-bottom:20px}

#player{display:none}
</style></head>
<body><div class="header">
<div class="logo"><div class="logo-box"></div>Nova Music</div>
</div><div class="search"><input id="search" placeholder="Search..." oninput="debounceSearch()"></div><div class="section-title">Recently</div>
<div class="row" id="recent"></div><div class="section-title">Search</div>
<div class="row" id="results"></div><div class="player" onclick="openFull()">
<img id="cover">
<div class="player-info">
<div id="title"></div>
<div class="artist" id="artist"></div>
<div class="progress" onclick="seek(event)"><div class="bar" id="bar"></div></div>
<div class="time"><span id="current">0:00</span><span id="duration">0:00</span></div>
</div>
<div class="controls">
<div class="btn small prev" onclick="prev();event.stopPropagation()"></div>
<div class="btn main play" id="playBtn" onclick="toggle();event.stopPropagation()"></div>
<div class="btn small next" onclick="next();event.stopPropagation()"></div>
<span class="like" onclick="like();event.stopPropagation()">❤</span>
<input type="range" min="0" max="100" value="100" class="volume" onchange="setVol(this.value);event.stopPropagation()">
</div>
</div><div class="full" id="full" onclick="this.style.display='none'">
<img id="fcover">
<div id="ftitle"></div>
<div id="fartist"></div>
</div><div id="player"></div><script>
const API_KEY="AIzaSyAZ-yES2YmYiLlSCztEVP4mFO6vPFGdZTM";
let player,playlist=[],current=0,playing=false,interval;
let recentList=JSON.parse(localStorage.getItem('recent')||'[]');
let liked=JSON.parse(localStorage.getItem('liked')||'[]');

function onYouTubeIframeAPIReady(){
 player=new YT.Player('player',{height:'0',width:'0',events:{onStateChange:e=>{if(e.data===0)next()}}});
 loadRecent();
}

function play(id,t,th,ch){
 playlist.push({id,t,th,ch});
 current=playlist.length-1;
 recentList.unshift({id,t,th,ch});
 recentList=recentList.slice(0,10);
 localStorage.setItem('recent',JSON.stringify(recentList));
 loadRecent();
 load();
 changeBG(th);
}

function load(){
 let s=playlist[current];
 player.loadVideoById(s.id);
 title.innerText=s.t;
 artist.innerText=s.ch;
 cover.src=s.th;
 fcover.src=s.th;
 ftitle.innerText=s.t;
 fartist.innerText=s.ch;
 playBtn.className='btn main pause';
 playing=true;
 startProgress();
}

function toggle(){
 if(playing){player.pauseVideo();playing=false;playBtn.className='btn main play'}
 else{player.playVideo();playing=true;playBtn.className='btn main pause'}
}

function next(){if(current<playlist.length-1){current++;load()}}
function prev(){if(current>0){current--;load()}}

function startProgress(){
 clearInterval(interval);
 interval=setInterval(()=>{
 if(!player||!player.getCurrentTime)return;
 let c=player.getCurrentTime();
 let d=player.getDuration();
 if(!d)return;
 bar.style.width=(c/d)*100+'%';
 let f=t=>Math.floor(t/60)+":"+(Math.floor(t%60)<10?'0':'')+Math.floor(t%60);
 current.innerText=f(c);
 duration.innerText=f(d);
 },500);
}

function seek(e){
 let r=e.currentTarget.getBoundingClientRect();
 let p=(e.clientX-r.left)/r.width;
 player.seekTo(player.getDuration()*p,true);
}

function setVol(v){player.setVolume(v)}

function like(){
 let s=playlist[current];
 liked.push(s);
 localStorage.setItem('liked',JSON.stringify(liked));
 alert('Liked!');
}

function changeBG(img){
 document.body.style.background=`linear-gradient(rgba(0,0,0,0.8),#000),url(${img}) center/cover`;
}

function openFull(){full.style.display='flex'}

function loadRecent(){
 let html='';
 recentList.forEach(v=>{
 html+=`<div class='card' onclick="play('${v.id}','${v.t}','${v.th}','${v.ch}')"><img src='${v.th}'><div class='info'><div class='title'>${v.t}</div><div class='artist'>${v.ch}</div></div></div>`;
 });
 recent.innerHTML=html;
}

let timeout;
function debounceSearch(){clearTimeout(timeout);timeout=setTimeout(searchYT,400)}

async function searchYT(){
 let q=search.value;
 if(q.length<2)return;
 results.innerHTML='Loading...';
 let r=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&type=video&maxResults=10&key=${API_KEY}`);
 let d=await r.json();
 let html='';
 d.items.forEach(v=>{
 let id=v.id.videoId;
 let t=v.snippet.title.replace(/'/g,'');
 let th=v.snippet.thumbnails.medium.url;
 let ch=v.snippet.channelTitle;
 html+=`<div class='card' onclick="play('${id}','${t}','${th}','${ch}')"><img src='${th}'><div class='info'><div class='title'>${t}</div><div class='artist'>${ch}</div></div></div>`;
 });
 results.innerHTML=html;
}
</script></body>
</html>
