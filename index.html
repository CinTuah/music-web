<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Music Ultra</title><style>
:root{
  --green:#1db954;
  --bg:#0e0e0e;
  --card:#181818;
  --text:#ffffff;
  --sub:#9aa0a6;
}

body{margin:0;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text)}

.header{padding:20px;font-size:22px;font-weight:600}

.search{padding:0 15px 15px}
.search input{width:100%;padding:14px;border-radius:30px;border:none;background:var(--card);color:white}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:12px}

.card{background:var(--card);border-radius:16px;overflow:hidden;cursor:pointer;transition:0.2s}
.card:hover{transform:scale(1.03)}
.card img{width:100%;height:130px;object-fit:cover}
.card .info{padding:10px}
.title{font-size:13px}
.artist{font-size:11px;color:var(--sub)}

/* PLAYER */
.player{
 position:fixed;bottom:10px;left:10px;right:10px;
 background:rgba(20,20,20,0.9);
 backdrop-filter:blur(15px);
 border-radius:20px;
 padding:12px;
 display:flex;align-items:center;gap:12px;
 box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.player img{width:55px;height:55px;border-radius:12px}
.player-info{flex:1}
.player-title{font-size:14px}
.player-artist{font-size:11px;color:var(--sub)}

.controls{display:flex;gap:12px}
.btn{
 width:40px;height:40px;border-radius:50%;
 background:var(--green);
 display:flex;align-items:center;justify-content:center;
 cursor:pointer;
}

.btn::before{content:'';display:block;width:0;height:0}
.btn.play::before{border-left:10px solid black;border-top:6px solid transparent;border-bottom:6px solid transparent;margin-left:3px}
.btn.pause::before{width:10px;height:10px;background:black;box-shadow:6px 0 0 black}

.small-btn{background:#2a2a2a}
.small-btn::before{border:none;width:8px;height:8px;background:white}

iframe{border:none;width:0;height:0}
</style></head><body><div class="header">Nova Music</div><div class="search">
<input type="text" id="search" placeholder="Search music..." oninput="debounceSearch()">
</div><div class="grid" id="results"></div><div class="player" id="playerUI" style="display:none">
  <img id="cover">
  <div class="player-info">
    <div class="player-title" id="title"></div>
    <div class="player-artist" id="artist"></div>
  </div>
  <div class="controls">
    <div class="btn small-btn" onclick="prev()"></div>
    <div class="btn play" id="playBtn" onclick="toggle()"></div>
    <div class="btn small-btn" onclick="next()"></div>
  </div>
</div><iframe id="player" allow="autoplay"></iframe><script>
const API_KEY = "AIzaSyAZ-yES2YmYiLlSCztEVP4mFO6vPFGdZTM";
let timeout,playlist=[],current=0,playing=false;

function play(id,title,thumb,channel){
 playlist=[{id,title,thumb,channel}];
 current=0;
 load();
}

function load(){
 let s=playlist[current];
 let iframe=document.getElementById("player");
 iframe.src=`https://www.youtube.com/embed/${s.id}?autoplay=1&enablejsapi=1`;

 document.getElementById("title").innerText=s.title;
 document.getElementById("artist").innerText=s.channel;
 document.getElementById("cover").src=s.thumb;
 document.getElementById("playerUI").style.display="flex";
 document.getElementById("playBtn").className="btn pause";
 playing=true;
}

function toggle(){
 let iframe=document.getElementById("player");
 let btn=document.getElementById("playBtn");
 if(playing){
 iframe.src="";
 btn.className="btn play";
 playing=false;
 }else{
 load();
 }
}

function next(){if(current<playlist.length-1){current++;load();}}
function prev(){if(current>0){current--;load();}}

function debounceSearch(){clearTimeout(timeout);timeout=setTimeout(searchYT,400)}

async function searchYT(){
 let q=document.getElementById("search").value;
 if(q.length<2) return;

 document.getElementById("results").innerHTML="Searching...";

 try{
 let res=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&type=video&maxResults=10&key=${API_KEY}`);
 let data=await res.json();

 let html="";
 data.items.forEach(v=>{
 let id=v.id.videoId;
 let title=v.snippet.title.replace(/'/g,"");
 let thumb=v.snippet.thumbnails.medium.url;
 let channel=v.snippet.channelTitle;

 html+=`<div class="card" onclick="play('${id}','${title}','${thumb}','${channel}')">
 <img src="${thumb}">
 <div class="info">
 <div class="title">${title}</div>
 <div class="artist">${channel}</div>
 </div>
 </div>`;
 });

 document.getElementById("results").innerHTML=html;

 }catch(e){document.getElementById("results").innerHTML="Error"}
}
</script></body>
</html>
