<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify Max Clone</title><style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #121212;
  color: white;
}

.header {
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

.search {
  padding: 10px;
}

.search input {
  width: 100%;
  padding: 12px;
  border-radius: 25px;
  border: none;
  background: #1e1e1e;
  color: white;
}

.section {
  padding: 15px;
}

.song {
  display: flex;
  align-items: center;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
}

.song:hover {
  background: #1e1e1e;
}

.song img {
  width: 55px;
  height: 55px;
  border-radius: 6px;
  margin-right: 10px;
}

.song-info {
  flex: 1;
}

.song button {
  background: none;
  border: none;
  color: #1db954;
  font-size: 18px;
}

.album {
  display: flex;
  overflow-x: auto;
  gap: 12px;
}

.album-item {
  width: 130px;
}

.album-item img {
  width: 100%;
  border-radius: 10px;
}

.navbar {
  position: fixed;
  bottom: 80px;
  width: 100%;
  display: flex;
  justify-content: space-around;
  background: #000;
  padding: 10px 0;
}

.navbar div {
  text-align: center;
  font-size: 12px;
}

.player {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #181818;
  padding: 5px;
}

iframe {
  border-radius: 10px;
}

</style></head><body><div class="header">🎧 Spotify Max</div><div class="search">
  <input type="text" id="search" placeholder="Search songs..." onkeyup="searchSong()">
</div><div class="section">
  <h3>Recently Played</h3>  <div class="song" onclick="play('dQw4w9WgXcQ')">
    <img src="https://img.youtube.com/vi/dQw4w9WgXcQ/0.jpg">
    <div class="song-info">
      <b>Never Gonna Give You Up</b><br>
      <small>Rick Astley</small>
    </div>
    <button>▶</button>
  </div>  <div class="song" onclick="play('3JZ_D3ELwOQ')">
    <img src="https://img.youtube.com/vi/3JZ_D3ELwOQ/0.jpg">
    <div class="song-info">
      <b>See You Again</b><br>
      <small>Wiz Khalifa</small>
    </div>
    <button>▶</button>
  </div>  <div class="song" onclick="play('kJQP7kiw5Fk')">
    <img src="https://img.youtube.com/vi/kJQP7kiw5Fk/0.jpg">
    <div class="song-info">
      <b>Despacito</b><br>
      <small>Luis Fonsi</small>
    </div>
    <button>▶</button>
  </div></div><div class="section">
  <h3>Albums</h3>
  <div class="album">
    <div class="album-item" onclick="play('dQw4w9WgXcQ')"><img src="https://img.youtube.com/vi/dQw4w9WgXcQ/0.jpg"></div>
    <div class="album-item" onclick="play('3JZ_D3ELwOQ')"><img src="https://img.youtube.com/vi/3JZ_D3ELwOQ/0.jpg"></div>
    <div class="album-item" onclick="play('kJQP7kiw5Fk')"><img src="https://img.youtube.com/vi/kJQP7kiw5Fk/0.jpg"></div>
  </div>
</div><div class="navbar">
  <div>🏠<br>Home</div>
  <div>🔍<br>Search</div>
  <div>📚<br>Library</div>
</div><div class="player">
  <iframe id="player" width="100%" height="70"
  src="https://www.youtube.com/embed/dQw4w9WgXcQ"
  allow="autoplay"></iframe>
</div><script>
let playlist = ['dQw4w9WgXcQ','3JZ_D3ELwOQ','kJQP7kiw5Fk'];
let current = 0;

function play(id){
  current = playlist.indexOf(id);
  document.getElementById("player").src =
  "https://www.youtube.com/embed/" + id + "?autoplay=1";
}

function next(){
  current++;
  if(current >= playlist.length) current = 0;
  play(playlist[current]);
}

function searchSong(){
  let input = document.getElementById("search").value.toLowerCase();
  let songs = document.getElementsByClassName("song");

  for(let i=0;i<songs.length;i++){
    let text = songs[i].innerText.toLowerCase();
    songs[i].style.display = text.includes(input) ? "flex" : "none";
  }
}
</script></body>
</html>
