<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Music Ultra</title><style>
:root{
  --green:#1db954;
  --bg:#121212;
  --card:#1e1e1e;
  --text:#ffffff;
  --sub:#b3b3b3;
}

body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:var(--bg);
  color:var(--text);
}

.header{
  padding:20px;
  font-size:22px;
  font-weight:600;
}

.search{
  padding:0 15px 15px;
}

.search input{
  width:100%;
  padding:14px;
  border-radius:30px;
  border:none;
  background:var(--card);
  color:white;
  font-size:14px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:var(--card);
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}

.card .info{
  padding:8px;
}

.card .title{
  font-size:13px;
}

.card .artist{
  font-size:11px;
  color:var(--sub);
}

/* FLOAT PLAYER */
.player{
  position:fixed;
  bottom:10px;
  left:10px;
  right:10px;
  background:rgba(30,30,30,0.95);
  backdrop-filter:blur(10px);
  border-radius:16px;
  padding:10px;
  display:flex;
  align-items:center;
  gap:10px;
}

.player img{
  width:50px;
  height:50px;
  border-radius:10px;
}

.player-info{
  flex:1;
}

.player-title{
  font-size:13px;
}

.player-artist{
  font-size:11px;
  color:var(--sub);
}

.controls{
  display:flex;
  gap:10px;
}

.btn{
  width:36px;
  height:36px;
  border-radius:50%;
  background:var(--green);
  display:flex;
  align-items:center;
  justify-content:center;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

iframe{display:none}

</style></head><body><div class="header">Nova Music</div><div class="search">
<input type="text" id="search" placeholder="Search music..." oninput="debounceSearch()">
</div><div class="grid" id="results"></div><div class="player" id="playerUI" style="display:none">
  <img id="cover">
  <div class="player-info">
    <div class="player-title" id="title"></div>
    <div class="player-artist" id="artist"></div>
  </div>
  <div class="controls">
    <div class="btn" onclick="prev()">◀</div>
    <div class="btn" id="playBtn" onclick="toggle()">▶</div>
    <div class="btn" onclick="next()">▶▶</div>
  </div>
</div><iframe id="player"></iframe><script>
const API_KEY = "AIzaSyAZ-yES2YmYiLlSCztEVP4mFO6vPFGdZTM";
let timeout;
let playlist=[];
let current=0;
let playing=false;

function play(id,title,thumb,channel){
 playlist.push({id,title,thumb,channel});
 current = playlist.length-1;
 load();
}

function load(){
 let s = playlist[current];
 document.getElementById("player").src =
 `https://www.youtube.com/embed/${s.id}?autoplay=1`;
 document.getElementById("title").innerText = s.title;
 document.getElementById("artist").innerText = s.channel;
 document.getElementById("cover").src = s.thumb;
 document.getElementById("playerUI").style.display = "flex";
 document.getElementById("playBtn").innerText = "⏸";
 playing=true;
}

function next(){ if(current<playlist.length-1){current++;load();} }
function prev(){ if(current>0){current--;load();} }

function toggle(){
 let iframe=document.getElementById("player");
 let btn=document.getElementById("playBtn");
 if(playing){iframe.src="";btn.innerText="▶";playing=false;}
 else{load();btn.innerText="⏸";}
}

function debounceSearch(){
 clearTimeout(timeout);
 timeout=setTimeout(searchYT,400);
}

async function searchYT(){
 let q=document.getElementById("search").value;
 if(q.length<2) return;

 document.getElementById("results").innerHTML="Searching...";

 try{
 let res=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&type=video&maxResults=10&key=${API_KEY}`);
 let data=await res.json();

 let html="";
 data.items.forEach(v=>{
 let id=v.id.videoId;
 let title=v.snippet.title.replace(/'/g,"");
 let thumb=v.snippet.thumbnails.medium.url;
 let channel=v.snippet.channelTitle;

 html+=`
 <div class="card" onclick="play('${id}','${title}','${thumb}','${channel}')">
   <img src="${thumb}">
   <div class="info">
     <div class="title">${title}</div>
     <div class="artist">${channel}</div>
   </div>
 </div>`;
 });

 document.getElementById("results").innerHTML=html;

 }catch(e){
 document.getElementById("results").innerHTML="Error";
 }
}
</script></body>
</html>
