<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Music Stable</title>
<script src="https://www.youtube.com/iframe_api"></script><style>
:root{--green:#1db954;--bg:#0a0a0a;--card:#181818;--text:#fff;--sub:#b3b3b3}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,sans-serif;background:var(--bg);color:var(--text)}

.header{padding:16px;font-weight:700;font-size:18px}

.search{padding:0 16px 10px}
.search input{width:100%;padding:12px 16px;border-radius:999px;border:none;background:#222;color:#fff}

.section{margin-bottom:12px}
.section-title{padding:0 16px 6px;color:#aaa;font-size:13px}
.row{display:flex;gap:12px;overflow-x:auto;padding:0 16px}

.card{min-width:140px;background:var(--card);border-radius:14px;overflow:hidden}
.card img{width:100%;height:120px;object-fit:cover}
.info{padding:8px}
.title{font-size:12px}
.artist{font-size:10px;color:var(--sub)}

/* PLAYER FIXED */
.player{
 position:fixed;
 bottom:10px;
 left:50%;
 transform:translateX(-50%);
 width:calc(100% - 20px);
 max-width:480px;
 height:64px;
 background:#181818;
 border-radius:16px;
 display:flex;
 align-items:center;
 padding:8px 10px;
 gap:10px;
 z-index:1000;
}

.player img{width:44px;height:44px;border-radius:10px}

.player-info{
 flex:1;
 display:flex;
 flex-direction:column;
 justify-content:center;
 overflow:hidden;
}

.player-title{
 font-size:13px;
 white-space:nowrap;
 overflow:hidden;
 text-overflow:ellipsis;
}

.player-artist{
 font-size:11px;
 color:var(--sub);
}

.controls{display:flex;align-items:center;gap:6px}

.btn{display:flex;align-items:center;justify-content:center;border-radius:50%}
.small{width:28px;height:28px;background:#2a2a2a}
.main{width:40px;height:40px;background:var(--green)}

.small.prev::before{content:'';border-right:7px solid white;border-top:4px solid transparent;border-bottom:4px solid transparent}
.small.next::before{content:'';border-left:7px solid white;border-top:4px solid transparent;border-bottom:4px solid transparent}

.main.play::before{content:'';border-left:11px solid black;border-top:6px solid transparent;border-bottom:6px solid transparent}
.main.pause::before{content:'';width:4px;height:12px;background:black;box-shadow:7px 0 0 black}

.progress{
 position:absolute;
 bottom:0;
 left:0;
 width:100%;
 height:2px;
 background:#333;
}
.bar{height:100%;width:0;background:var(--green)}

#player{display:none}
</style></head>
<body><div class="header">Nova Music</div><div class="search">
<input id="search" placeholder="Search music..." oninput="debounceSearch()">
</div><div class="section">
<div class="section-title">Recently</div>
<div class="row" id="recent"></div>
</div><div class="section">
<div class="section-title">Search</div>
<div class="row" id="results"></div>
</div><div class="player" id="playerUI" style="display:none">
<img id="cover"><div class="player-info">
<div class="player-title" id="title"></div>
<div class="player-artist" id="artist"></div>
</div><div class="controls">
<div class="btn small prev" onclick="prev()"></div>
<div class="btn main play" id="playBtn" onclick="toggle()"></div>
<div class="btn small next" onclick="next()"></div>
</div><div class="progress"><div class="bar" id="bar"></div></div>
</div><div id="player"></div><script>
const API_KEY="AIzaSyAZ-yES2YmYiLlSCztEVP4mFO6vPFGdZTM";
let player,playlist=[],current=0,playing=false,interval;
let recentList=JSON.parse(localStorage.getItem('recent')||'[]');

function onYouTubeIframeAPIReady(){
 player=new YT.Player('player',{height:'0',width:'0',events:{onStateChange:e=>{if(e.data===0)next()}}});
 loadRecent();
}

function play(id,t,th,ch){
 playlist.push({id,t,th,ch});
 current=playlist.length-1;
 recentList.unshift({id,t,th,ch});
 recentList=recentList.slice(0,10);
 localStorage.setItem('recent',JSON.stringify(recentList));
 loadRecent();
 load();
}

function load(){
 let s=playlist[current];
 player.loadVideoById(s.id);
 title.innerText=s.t;
 artist.innerText=s.ch;
 cover.src=s.th;
 playerUI.style.display='flex';
 playBtn.className='btn main pause';
 playing=true;
 startProgress();
}

function toggle(){
 if(playing){player.pauseVideo();playing=false;playBtn.className='btn main play'}
 else{player.playVideo();playing=true;playBtn.className='btn main pause'}
}

function next(){if(current<playlist.length-1){current++;load()}}
function prev(){if(current>0){current--;load()}}

function startProgress(){
 clearInterval(interval);
 interval=setInterval(()=>{
 if(!player||!player.getCurrentTime)return;
 let c=player.getCurrentTime();
 let d=player.getDuration();
 if(!d)return;
 bar.style.width=(c/d)*100+'%';
 },500);
}

function loadRecent(){
 let html='';
 recentList.forEach(v=>{
 html+=`<div class='card' onclick="play('${v.id}','${v.t}','${v.th}','${v.ch}')"><img src='${v.th}'><div class='info'><div class='title'>${v.t}</div><div class='artist'>${v.ch}</div></div></div>`;
 });
 recent.innerHTML=html;
}

let timeout;
function debounceSearch(){clearTimeout(timeout);timeout=setTimeout(searchYT,400)}

async function searchYT(){
 let q=search.value;
 if(q.length<2)return;
 results.innerHTML='Loading...';
 let r=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&type=video&maxResults=10&key=${API_KEY}`);
 let d=await r.json();
 let html='';
 d.items.forEach(v=>{
 let id=v.id.videoId;
 let t=v.snippet.title.replace(/'/g,'');
 let th=v.snippet.thumbnails.medium.url;
 let ch=v.snippet.channelTitle;
 html+=`<div class='card' onclick="play('${id}','${t}','${th}','${ch}')"><img src='${th}'><div class='info'><div class='title'>${t}</div><div class='artist'>${ch}</div></div></div>`;
 });
 results.innerHTML=html;
}
</script></body>
</html>
