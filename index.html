<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Music Pro</title>

<style>
:root{--green:#1db954}
body{margin:0;font-family:Arial;background:#121212;color:#fff}

/* HEADER */
.header{
 display:flex;align-items:center;gap:10px;
 padding:15px;font-size:20px;font-weight:bold
}
.logo{
 width:36px;height:36px;border-radius:50%;
 background:linear-gradient(45deg,#1db954,#00ffc6);
 display:flex;align-items:center;justify-content:center
}

/* SEARCH */
.search{padding:10px}
.search input{
 width:100%;padding:12px;border-radius:25px;
 border:none;background:#1e1e1e;color:#fff
}

/* SONG LIST */
.song{
 display:flex;align-items:center;gap:10px;
 padding:10px;border-radius:10px;cursor:pointer
}
.song:hover{background:#1e1e1e}
.song img{width:55px;height:55px;border-radius:8px}
.info{flex:1}
.title{font-size:14px}
.artist{font-size:11px;color:#aaa}
.play{color:var(--green);font-size:18px}

/* PLAYER */
.player{
 position:fixed;bottom:0;width:100%;
 background:#181818;padding:10px;
 border-top:1px solid #333
}
.now{font-size:12px;text-align:center}

.controls{
 display:flex;justify-content:center;
 gap:20px;margin-top:5px;font-size:20px
}
.btn{cursor:pointer}

.loader{text-align:center;padding:20px;color:#aaa}
iframe{display:none}
</style>
</head>

<body>

<div class="header">
<div class="logo">N</div>
Nova Music Pro
</div>

<div class="search">
<input type="text" id="search" placeholder="Search song..." oninput="debounceSearch()">
</div>

<div id="results"></div>

<div class="player">
<div class="now" id="nowPlaying">Not playing</div>

<div class="controls">
<span class="btn" onclick="prev()">⏮</span>
<span class="btn" onclick="toggle()">⏯</span>
<span class="btn" onclick="next()">⏭</span>
</div>

<iframe id="player"></iframe>
</div>

<script>
const API_KEY = "ISI_API_KEY_KAMU"; // 🔥 ganti

let timeout;
let playlist=[];
let current=0;
let playing=false;

/* PLAY */
function play(id,title){
 playlist.push({id,title});
 current = playlist.length-1;
 load();
}

/* LOAD SONG */
function load(){
 let s = playlist[current];
 document.getElementById("player").src =
 `https://www.youtube.com/embed/${s.id}?autoplay=1`;
 document.getElementById("nowPlaying").innerText = s.title;
 playing=true;
}

/* NEXT */
function next(){
 if(current < playlist.length-1){
 current++;
 load();
 }
}

/* PREV */
function prev(){
 if(current > 0){
 current--;
 load();
 }
}

/* TOGGLE */
function toggle(){
 let iframe = document.getElementById("player");
 if(playing){
 iframe.src="";
 playing=false;
 }else{
 load();
 }
}

/* SEARCH DELAY */
function debounceSearch(){
 clearTimeout(timeout);
 timeout=setTimeout(searchYT,500);
}

/* SEARCH API */
async function searchYT(){
 let q = document.getElementById("search").value;
 if(q.length<2) return;

 document.getElementById("results").innerHTML =
 '<div class="loader">Searching...</div>';

 try{
 let res = await fetch(
 `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&type=video&maxResults=10&key=${API_KEY}`
 );
 let data = await res.json();

 let html="";

 data.items.forEach(v=>{
 let id = v.id.videoId;
 let title = v.snippet.title.replace(/'/g,"");
 let thumb = v.snippet.thumbnails.medium.url;
 let channel = v.snippet.channelTitle;

 html+=`
 <div class="song" onclick="play('${id}','${title}')">
   <img src="${thumb}">
   <div class="info">
     <div class="title">${title}</div>
     <div class="artist">${channel}</div>
   </div>
   <div class="play">▶</div>
 </div>`;
 });

 document.getElementById("results").innerHTML = html;

 }catch(e){
 document.getElementById("results").innerHTML =
 '<div class="loader">Error loading 😢</div>';
 }
}
</script>

</body>
</html>
